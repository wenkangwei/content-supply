mysql:
  host: "${env:MYSQL_HOST:localhost}"
  port: 3306
  user: "rec_user"
  password: "${env:MYSQL_PASSWORD:rec_pass}"
  database: "rec_platform"
  pool_size: 5

redis:
  host: "${env:REDIS_HOST:localhost}"
  port: 6379
  db: 0

llm:
  base_url: "${env:LLM_BASE_URL:http://localhost:11434/v1}"
  api_key: "${env:LLM_API_KEY:ollama}"
  model: "qwen2.5:7b"
  max_tokens: 2048
  temperature: 0.7

scheduler:
  enabled: true
  rss_default_interval: 1800
  hot_track_interval: 3600
  cleanup_cron: "0 3 * * *"
  rewrite_cron: "0 4 * * *"
  tag_mining_cron: "0 2 * * 0"

notification:
  enabled: false
  webhook_url: null
  auto_confirm_after_hours: 24

server:
  host: "0.0.0.0"
  port: 8010
  log_level: "info"
